<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="keywords" content="ACM">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ACM Registration Page </title>

<style>
table, tr, td {
border: 2px solid black;
}
</style>

<script>
function validate() {
    var letters = /^[A-Za-z]+$/;

    var fname = document.getElementById("fname").value;
    var lname = document.getElementById("lname").value;
    var email = document.getElementById("email").value;

    // First name check
    if(!fname.match(letters)) {
        alert("Not a valid First Name");
        return false;
    }

    // Last name check
    if(!lname.match(letters)) {
        alert("Not a valid Last Name");
        return false;
    }

    // Email check (must be UNCP)
    var domain = email.substring(email.lastIndexOf("@") + 1);

    if(domain !== "uncp.edu" && domain !== "bravemail.uncp.edu") {
        alert("Email must be a UNCP email address");
        return false;
    }

    return true;
}

window.onload = function() {
    const urlParams = new URLSearchParams(window.location.search);
    const msg = urlParams.get('msg');
    if (msg) {
        document.getElementById('msg').textContent = msg;
    }
};
</script>

</head>

<body>

<!-- This page is created by Marcus Bland Jr. -->

<h1>Registration Form </h1>

<p id="msg" style="color:red;">
If you already have an account, <a href="login2T1.html">login here</a></p>

<form name="myForm" onsubmit="return validate()" action="register.php" method="post">

<table>

<tr>
<td><label for="fname">First Name:</label></td>
<td><input type="text" id="fname" name="fname" required></td>
</tr>

<tr>
<td><label for="lname">Last Name:</label></td>
<td><input type="text" id="lname" name="lname" required></td>
</tr>

<tr>
<td><label for="email">Email:</label></td>
<td><input type="email" id="email" name="email" required></td>
</tr>

<tr>
<td><label for="username">Select Username:</label></td>
<td><input type="text" id="username" name="username" required></td>
</tr>

<tr>
<td><label for="password">Select Password:</label></td>
<td><input type="password" id="password" name="password" required></td>
</tr>

<tr>
<td><label for="deposit">Deposit:</label></td>
<td><input type="number" id="deposit" name="deposit" required></td>
</tr>

<tr>
<td colspan="2" style="text-align:center;">
<input type="reset" value="Reset">
<input type="submit" value="Submit">
</td>
</tr>

</table>

</form>

</body>
</html>
